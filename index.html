<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0d14">
<title>🎾 NTRP 자가진단 & 복식 전술</title>
<style>
  :root {
    --bg: #0a0d14;
    --surface: #131824;
    --surface2: #1b2231;
    --border: #232c3f;
    --text: #eef2f8;
    --dim: #8b95a8;
    --accent: #c9f24b;
    --accent-deep: #93b52c;
    --accent-soft: rgba(201, 242, 75, 0.12);
    --green: #4ade80;
    --blue: #5aa7ff;
    --red: #ff6b6b;
    --amber: #fbbf24;
    --court: #17372a;
    --court-line: rgba(255,255,255,0.55);
    --radius: 18px;
    --mono: 'SF Mono', 'Menlo', ui-monospace, monospace;
    --nav-h: 64px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Segoe UI', sans-serif;
    background:
      radial-gradient(900px 500px at 85% -10%, rgba(201,242,75,0.07), transparent 60%),
      radial-gradient(700px 400px at -10% 20%, rgba(90,167,255,0.06), transparent 55%),
      var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom) + 24px);
    -webkit-font-smoothing: antialiased;
  }
  button { font: inherit; color: inherit; -webkit-tap-highlight-color: transparent; }

  .wrap { max-width: 560px; margin: 0 auto; padding: 0 18px; }

  /* ── screens & transitions ─────────────────────────── */
  .screen { animation: fadeSlide .32s ease both; }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── hero ──────────────────────────────────────────── */
  .hero { padding: calc(52px + env(safe-area-inset-top)) 0 10px; }
  .hero .eyebrow {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--mono); font-size: 11px; font-weight: 700;
    letter-spacing: 1.6px; text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-soft);
    border: 1px solid rgba(201,242,75,0.25);
    padding: 4px 12px; border-radius: 999px;
  }
  .hero h1 { font-size: 27px; font-weight: 800; letter-spacing: -0.5px; margin-top: 14px; line-height: 1.3; }
  .hero p { font-size: 13.5px; color: var(--dim); margin-top: 8px; max-width: 430px; }

  /* ── cards ─────────────────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-top: 14px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.25);
  }
  .card-title { font-size: 15px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
  .card-sub { font-size: 12.5px; color: var(--dim); margin-top: 4px; }

  .note {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 0 12px 12px 0;
    padding: 12px 14px;
    font-size: 12.5px;
    color: var(--dim);
    margin-top: 14px;
  }
  .note b { color: var(--text); }

  /* ── buttons ───────────────────────────────────────── */
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%;
    border: none; cursor: pointer;
    border-radius: 999px;
    padding: 15px 20px;
    font-size: 15px; font-weight: 800;
    transition: transform .12s ease, opacity .15s, box-shadow .2s;
  }
  .btn:active { transform: scale(0.98); }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #a8d833);
    color: #0c1005;
    box-shadow: 0 6px 22px rgba(201,242,75,0.25);
  }
  .btn-ghost {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn:disabled { opacity: 0.35; cursor: default; box-shadow: none; }
  .btn-row { display: flex; gap: 10px; margin-top: 18px; }
  .btn-row .btn-ghost { flex: 0 0 30%; }

  .text-link {
    display: block; width: fit-content; margin: 20px auto 0;
    background: none; border: none; cursor: pointer;
    font-size: 12.5px; color: var(--dim);
    text-decoration: underline; text-underline-offset: 3px;
  }

  /* ── quiz step ─────────────────────────────────────── */
  .step-top {
    position: sticky; top: 0; z-index: 40;
    background: rgba(10,13,20,0.86);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: calc(10px + env(safe-area-inset-top)) 18px 10px;
  }
  .step-top-inner { max-width: 560px; margin: 0 auto; }
  .step-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .step-label { font-family: var(--mono); font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
  .step-count { font-family: var(--mono); font-size: 11px; color: var(--dim); }
  .pbar { height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .pbar-fill { height: 100%; background: linear-gradient(90deg, var(--accent-deep), var(--accent)); border-radius: 3px; transition: width .35s ease; }

  .step-head { margin-top: 22px; }
  .step-head h2 { font-size: 21px; font-weight: 800; letter-spacing: -0.3px; }
  .step-head p { font-size: 12.5px; color: var(--dim); margin-top: 4px; }

  .qcard {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px;
    margin-top: 12px;
  }
  .qtop { display: flex; align-items: flex-start; gap: 9px; margin-bottom: 11px; }
  .qanchor {
    flex-shrink: 0;
    font-family: var(--mono); font-size: 10px; font-weight: 700;
    color: var(--accent);
    background: var(--accent-soft);
    border: 1px solid rgba(201,242,75,0.3);
    border-radius: 6px;
    padding: 2px 7px; margin-top: 2px;
    letter-spacing: 0.5px;
  }
  .qtext { font-size: 13.5px; }
  .qchoices { display: flex; gap: 7px; }
  .qchoice {
    flex: 1; text-align: center;
    font-size: 12.5px; font-weight: 700;
    padding: 10px 4px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--dim);
    cursor: pointer;
    transition: border-color .15s, background .15s, color .15s, transform .1s;
  }
  .qchoice:active { transform: scale(0.97); }
  .qchoice[data-sev="0"].active   { border-color: var(--red);   color: var(--red);   background: rgba(255,107,107,0.1); }
  .qchoice[data-sev="0.5"].active { border-color: var(--amber); color: var(--amber); background: rgba(251,191,36,0.1); }
  .qchoice[data-sev="1"].active   { border-color: var(--green); color: var(--green); background: rgba(74,222,128,0.1); }
  .qchoice.active-blue { border-color: var(--blue); color: var(--blue); background: rgba(90,167,255,0.1); }

  /* ── result ────────────────────────────────────────── */
  .ring-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; margin: 26px 0 6px; }
  .ring {
    width: 168px; height: 168px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .ring::before {
    content: ''; position: absolute; inset: 0; border-radius: 50%;
    background: conic-gradient(var(--accent) calc(var(--pct) * 1%), var(--surface2) 0);
    -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 11px), #000 calc(100% - 10px));
    mask: radial-gradient(farthest-side, transparent calc(100% - 11px), #000 calc(100% - 10px));
  }
  .ring-inner { text-align: center; }
  .ring-inner .num { font-family: var(--mono); font-size: 42px; font-weight: 800; color: var(--accent); line-height: 1.1; }
  .ring-inner .lbl { font-family: var(--mono); font-size: 10px; letter-spacing: 1.2px; color: var(--dim); }
  .conf-badge {
    font-family: var(--mono); font-size: 11px; font-weight: 700;
    padding: 4px 14px; border-radius: 999px;
    border: 1px solid var(--border); color: var(--dim);
  }
  .conf-badge.high { color: var(--green); border-color: rgba(74,222,128,0.5); background: rgba(74,222,128,0.08); }
  .conf-badge.mid  { color: var(--amber); border-color: rgba(251,191,36,0.5); background: rgba(251,191,36,0.08); }
  .conf-badge.low  { color: var(--red);   border-color: rgba(255,107,107,0.5); background: rgba(255,107,107,0.08); }

  .cap-note {
    background: rgba(255,107,107,0.08);
    border: 1px solid rgba(255,107,107,0.4);
    border-radius: 12px;
    padding: 11px 13px;
    font-size: 12.5px; color: var(--red);
    margin-top: 14px;
  }
  .descriptor {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 0 14px 14px 0;
    padding: 13px 15px;
    font-size: 13px; line-height: 1.7;
    margin-top: 14px;
  }
  .descriptor b { color: var(--accent); }

  .section-label {
    font-family: var(--mono); font-size: 11px; font-weight: 700;
    letter-spacing: 1.2px; color: var(--dim); text-transform: uppercase;
    margin: 26px 0 4px;
  }
  .bd-row { padding: 10px 0; border-bottom: 1px solid var(--border); }
  .bd-row:last-child { border-bottom: none; }
  .bd-top { display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
  .bd-row .name { color: var(--dim); }
  .bd-row .lvl { font-family: var(--mono); font-weight: 700; }
  .bd-row.weakest .name, .bd-row.weakest .lvl { color: var(--red); }
  .bd-track { height: 5px; background: var(--surface2); border-radius: 3px; margin-top: 7px; overflow: hidden; }
  .bd-fill { height: 100%; background: linear-gradient(90deg, var(--accent-deep), var(--accent)); border-radius: 3px; }
  .bd-row.weakest .bd-fill { background: var(--red); }

  .tip-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 14px;
    font-size: 12.5px; color: var(--dim); line-height: 1.65;
    margin-top: 8px;
  }
  .tip-card b { color: var(--red); }

  /* ── home: last result card ────────────────────────── */
  .last-result { display: flex; align-items: center; gap: 14px; cursor: pointer; }
  .last-result .mini-ring {
    width: 56px; height: 56px; border-radius: 50%; flex-shrink: 0;
    border: 2.5px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 15px; font-weight: 800; color: var(--accent);
    background: var(--accent-soft);
  }
  .last-result .info { flex: 1; min-width: 0; }
  .chev { color: var(--dim); font-size: 18px; }

  .feature-row { display: flex; align-items: flex-start; gap: 12px; }
  .feature-ico {
    flex-shrink: 0; width: 40px; height: 40px; border-radius: 12px;
    background: var(--surface2); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center; font-size: 19px;
  }

  /* ── tactics tab ───────────────────────────────────── */
  .seg-scroll {
    display: flex; gap: 12px; overflow-x: auto;
    scroll-snap-type: x mandatory;
    padding: 4px 18px 12px;
    margin: 14px -18px 0;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .seg-scroll::-webkit-scrollbar { display: none; }
  .formation-card {
    flex: 0 0 82%;
    max-width: 330px;
    scroll-snap-align: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  .formation-card h3 { font-size: 15px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
  .formation-tag {
    font-family: var(--mono); font-size: 9.5px; font-weight: 700;
    letter-spacing: 0.8px;
    color: var(--blue);
    background: rgba(90,167,255,0.1);
    border: 1px solid rgba(90,167,255,0.35);
    padding: 2px 8px; border-radius: 999px;
  }
  .court-box { margin: 12px 0; background: var(--court); border-radius: 12px; padding: 10px; }
  .court-box svg { display: block; width: 100%; height: auto; }
  .formation-card .desc { font-size: 12.5px; line-height: 1.65; }
  .fm-meta { margin-top: 10px; font-size: 12px; line-height: 1.6; }
  .fm-meta .row { display: flex; gap: 8px; margin-top: 5px; }
  .fm-meta .k { flex-shrink: 0; font-weight: 800; font-size: 11px; padding-top: 1px; }
  .fm-meta .k.when { color: var(--green); }
  .fm-meta .k.weak { color: var(--red); }
  .fm-meta .v { color: var(--dim); }
  .legend { display: flex; gap: 14px; margin-top: 10px; font-size: 11px; color: var(--dim); }
  .legend span { display: inline-flex; align-items: center; gap: 5px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

  details.lesson {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-top: 10px;
    overflow: hidden;
  }
  details.lesson summary {
    list-style: none; cursor: pointer;
    display: flex; align-items: center; gap: 10px;
    padding: 15px 16px;
    font-size: 14.5px; font-weight: 800;
  }
  details.lesson summary::-webkit-details-marker { display: none; }
  details.lesson summary .arrow { margin-left: auto; color: var(--dim); transition: transform .2s; font-size: 12px; }
  details.lesson[open] summary .arrow { transform: rotate(90deg); }
  .lesson-body { padding: 0 16px 14px; }
  .lesson-item { border-top: 1px solid var(--border); padding: 12px 0; }
  .lesson-item h4 { font-size: 13.5px; font-weight: 800; color: var(--accent); margin-bottom: 4px; }
  .lesson-item p { font-size: 12.5px; color: var(--dim); line-height: 1.7; }

  .level-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 15px 16px;
    margin-top: 10px;
  }
  .level-card.mine { border-color: rgba(201,242,75,0.5); box-shadow: 0 0 0 1px rgba(201,242,75,0.25), 0 6px 20px rgba(201,242,75,0.07); }
  .level-head { display: flex; align-items: center; gap: 9px; }
  .level-range {
    font-family: var(--mono); font-size: 12px; font-weight: 800;
    color: var(--blue);
    background: rgba(90,167,255,0.1);
    border: 1px solid rgba(90,167,255,0.35);
    padding: 2px 9px; border-radius: 7px;
  }
  .level-head h3 { font-size: 14px; font-weight: 800; }
  .mine-badge {
    margin-left: auto;
    font-family: var(--mono); font-size: 10px; font-weight: 800;
    color: #0c1005; background: var(--accent);
    padding: 2px 9px; border-radius: 999px;
  }
  .level-card ul { margin-top: 9px; padding-left: 4px; list-style: none; }
  .level-card li { font-size: 12.5px; color: var(--dim); padding: 3px 0 3px 18px; position: relative; }
  .level-card li::before { content: '›'; position: absolute; left: 4px; color: var(--accent); font-weight: 800; }

  /* quiz (tactics) */
  .tq-progress { font-family: var(--mono); font-size: 11px; color: var(--dim); margin-top: 4px; }
  .tq-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 15px;
    margin-top: 10px;
  }
  .tq-q { font-size: 13.5px; font-weight: 700; margin-bottom: 11px; }
  .tq-q .idx { color: var(--blue); font-family: var(--mono); margin-right: 6px; }
  .tq-opt {
    display: block; width: 100%; text-align: left;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 11px;
    padding: 11px 13px;
    font-size: 12.5px;
    margin-top: 7px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .tq-opt.correct { border-color: var(--green); color: var(--green); background: rgba(74,222,128,0.08); }
  .tq-opt.wrong { border-color: var(--red); color: var(--red); background: rgba(255,107,107,0.08); }
  .tq-opt:disabled { cursor: default; opacity: 0.85; }
  .tq-why {
    margin-top: 10px;
    background: var(--surface2);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 12px; color: var(--dim); line-height: 1.65;
    animation: fadeSlide .25s ease both;
  }
  .tq-why b { color: var(--green); }
  .tq-score {
    text-align: center;
    font-family: var(--mono); font-size: 13px; font-weight: 800;
    color: var(--accent);
    margin-top: 16px;
  }

  /* ── bottom nav ────────────────────────────────────── */
  .bottomnav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 80;
    background: rgba(15,19,29,0.88);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-top: 1px solid var(--border);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .bottomnav-inner {
    max-width: 560px; margin: 0 auto;
    display: flex; height: var(--nav-h);
  }
  .navbtn {
    flex: 1;
    background: none; border: none; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
    color: var(--dim);
    font-size: 10.5px; font-weight: 700;
    transition: color .15s;
  }
  .navbtn svg { width: 22px; height: 22px; }
  .navbtn.active { color: var(--accent); }
</style>
</head>
<body>

<main id="app">
  <section id="tab-assess"></section>
  <section id="tab-tactics" hidden></section>
</main>

<nav class="bottomnav">
  <div class="bottomnav-inner">
    <button class="navbtn active" id="nav-assess" onclick="goTab('assess')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      NTRP 진단
    </button>
    <button class="navbtn" id="nav-tactics" onclick="goTab('tactics')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
      복식 전술
    </button>
  </div>
</nav>

<!-- shared svg defs (arrow markers for court diagrams) -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <marker id="arrBall" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c9f24b"/>
    </marker>
    <marker id="arrMove" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="rgba(255,255,255,0.65)"/>
    </marker>
  </defs>
</svg>

<script>
/* ═══════════════════════════════════════════════════════
   데이터: NTRP 진단 문항
   각 카테고리는 USTA NTRP General Characteristics의
   2.5 → 4.0 등급 서술을 앵커로 하는 능력 사다리 4문항.
   ═══════════════════════════════════════════════════════ */
const SEV_LABELS = ['잘 안 된다', '가끔 된다', '안정적이다'];
const SEV_VALUES = [0, 0.5, 1];
const STORAGE_KEY = 'ntrp-check-v3';

const CATEGORIES = [
  {
    key: 'forehand', title: '포핸드', icon: '🎾',
    sub: '연습이 아닌 실제 게임 기준으로 답하세요',
    options: [
      { anchor: '2.5', text: '중간 속도로 오는 공을 포핸드로 네트 위로 넘겨 코트 안에 넣을 수 있다' },
      { anchor: '3.0', text: '중간 속도 랠리에서 포핸드 실수가 드물고, 꾸준히 이어갈 수 있다' },
      { anchor: '3.5', text: '랠리 중 포핸드로 방향(크로스/다운더라인)을 의도해서 조절할 수 있다' },
      { anchor: '4.0', text: '포핸드에 깊이·스핀·파워를 더해 상대를 밀어내거나 찬스볼을 만들 수 있다' },
    ],
  },
  {
    key: 'backhand', title: '백핸드', icon: '🎾',
    sub: '연습이 아닌 실제 게임 기준으로 답하세요',

/* ═══════════════════════════════════════════════════════
   상태
   ═══════════════════════════════════════════════════════ */
const TOTAL_STEPS = CATEGORIES.length + 1; // 카테고리 10 + 실전 경험 1
const state = {
  tab: 'assess',
  mode: 'home',   // home | quiz | result
  step: 0,
  answers: {},    // catKey -> [sev x4]
  exp: [null, null, null],
  quizPicks: {},  // 전술 퀴즈 (세션 한정)
};

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ answers: state.answers, exp: state.exp }));
  } catch (e) { /* 저장 불가 환경이면 무시 */ }
}
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (data.answers) {
      Object.entries(data.answers).forEach(([k, arr]) => {
        if (CATEGORIES.some(c => c.key === k) && Array.isArray(arr) && arr.length === 4) {
          state.answers[k] = arr;
        }
      });
    }
    if (Array.isArray(data.exp) && data.exp.length === 3) {
      data.exp.forEach((v, i) => { state.exp[i] = v; });
    }
  } catch (e) { /* 파싱 실패 시 초기 상태 */ }
}

/* ═══════════════════════════════════════════════════════
   판정 로직 (기존과 동일: min(평균, 최저+0.5), 0.25 내림, 경험 캡)
   ═══════════════════════════════════════════════════════ */
function isCatComplete(key) {
  const arr = state.answers[key];
  return !!arr && arr.every(v => v !== null && v !== undefined);
}
function isExpComplete() {
  return state.exp.every(v => v !== null && v !== undefined);
}
function allComplete() {
  return CATEGORIES.every(c => isCatComplete(c.key)) && isExpComplete();
}
function computeLevel(key) {
  const sum = state.answers[key].reduce((a, b) => a + (b || 0), 0); // 0~4
  return 2.5 + sum * 0.5; // 2.5~4.5
}
function computeResult() {
  const values = CATEGORIES.map(c => computeLevel(c.key));
  const min = Math.min(...values);
  const avg = values.reduce((a, b) => a + b, 0) / values.length;
  const raw = Math.min(avg, min + 0.5);
  let level = Math.floor(raw * 4) / 4;
  const capped = state.exp[1] === 0 && level > 3.0;
  if (capped) level = 3.0;
  const expScore = state.exp.reduce((a, b) => a + b, 0);
  const confidence = expScore >= 5 ? 'high' : expScore >= 3 ? 'mid' : 'low';
  return { values, min, avg, level, capped, confidence };
}

/* ═══════════════════════════════════════════════════════
   렌더: NTRP 진단 탭
   ═══════════════════════════════════════════════════════ */
function answeredCount() {
  let n = 0;
  CATEGORIES.forEach(c => { if (isCatComplete(c.key)) n++; });
  if (isExpComplete()) n++;
  return n;
}

function renderAssess() {
  const el = document.getElementById('tab-assess');
  if (state.mode === 'home') el.innerHTML = tmplHome();
  else if (state.mode === 'quiz') el.innerHTML = tmplStep(state.step);
  else el.innerHTML = tmplResult();
  window.scrollTo(0, 0);
}

function tmplStep(step) {
  const isExp = step >= CATEGORIES.length;
  const pct = ((step + 1) / TOTAL_STEPS * 100).toFixed(1);
  let body, title, sub, icon, complete;

  if (!isExp) {
    const cat = CATEGORIES[step];
    title = cat.title; sub = cat.sub; icon = cat.icon;
    complete = isCatComplete(cat.key);
    body = cat.options.map((opt, oi) => {
      const cur = (state.answers[cat.key] || [])[oi];
      return `
      <div class="qcard">
        <div class="qtop">
          <span class="qanchor">${opt.anchor}</span>
          <span class="qtext">${opt.text}</span>
        </div>
        <div class="qchoices">
          ${SEV_VALUES.map((sev, si) => `
            <button class="qchoice ${cur === sev ? 'active' : ''}" data-sev="${sev}" data-cat="${cat.key}" data-idx="${oi}"
              onclick="setSev('${cat.key}', ${oi}, ${sev})">${SEV_LABELS[si]}</button>`).join('')}
        </div>
      </div>`;
    }).join('');
  } else {
    title = '실전 경험'; sub = 'NTRP는 경기 결과 기반 지표입니다. 경험이 적으면 판정 신뢰도가 낮아집니다.'; icon = '🏟️';
    complete = isExpComplete();
    body = EXP_QUESTIONS.map((q, qi) => `
      <div class="qcard">
        <div class="qtop"><span class="qtext" style="font-weight:700">${q.text}</span></div>
        <div class="qchoices">
          ${q.labels.map((label, li) => `
            <button class="qchoice ${state.exp[qi] === li ? 'active-blue' : ''}" data-exp="${qi}" data-opt="${li}"
              onclick="setExp(${qi}, ${li})">${label}</button>`).join('')}
        </div>
      </div>`).join('');
  }

  const isLast = step === TOTAL_STEPS - 1;
  return `
  <div class="step-top">
    <div class="step-top-inner">
      <div class="step-meta">
        <span class="step-label">${icon} ${title}</span>
        <span class="step-count">STEP ${step + 1} / ${TOTAL_STEPS}</span>
      </div>
      <div class="pbar"><div class="pbar-fill" style="width:${pct}%"></div></div>
    </div>
  </div>
  <div class="screen wrap">
    <div class="step-head">
      <h2>${title}</h2>
      <p>${sub}</p>
    </div>
    ${body}
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="${step === 0 ? 'goHome()' : 'goStep(' + (step - 1) + ')'}">← ${step === 0 ? '홈' : '이전'}</button>
      <button class="btn btn-primary" id="nextBtn" ${complete ? '' : 'disabled'}
        onclick="${isLast ? 'finishQuiz()' : 'goStep(' + (step + 1) + ')'}">${isLast ? '결과 보기 🎾' : '다음 →'}</button>
    </div>
  </div>`;
}

function tmplResult() {
  const r = computeResult();
  const pct = Math.max(4, (r.level - 2.5) / 2 * 100);
  const confLabels = { high: '신뢰도 높음', mid: '신뢰도 보통', low: '신뢰도 낮음' };
  const descKey = (Math.floor(r.level * 2) / 2).toFixed(1);

  const breakdown = CATEGORIES.map(c => {
    const val = computeLevel(c.key);
    const isWeakest = val === r.min;
    const barPct = ((val - 2.5) / 2 * 100).toFixed(0);
    return `
    <div class="bd-row ${isWeakest ? 'weakest' : ''}">
      <div class="bd-top">
        <span class="name">${c.icon} ${c.title}${isWeakest ? ' — 약점' : ''}</span>
        <span class="lvl">${val.toFixed(2)}</span>
      </div>
      <div class="bd-track"><div class="bd-fill" style="width:${barPct}%"></div></div>
    </div>`;
  }).join('');

  const tips = CATEGORIES
    .map(c => ({ c, val: computeLevel(c.key) }))
    .sort((a, b) => a.val - b.val)
    .slice(0, 2)
    .map(({ c, val }) => `<div class="tip-card"><b>${c.title} (${val.toFixed(2)})</b> — ${TIPS[c.key]}</div>`)
    .join('');

  return `
  <div class="screen wrap">
    <div class="hero" style="padding-bottom:0">
      <span class="eyebrow">🎾 Result</span>
      <h1>진단 결과</h1>
    </div>
    <div class="ring-wrap">
      <div class="ring" style="--pct:${pct}">
        <div class="ring-inner">
          <div class="num">${r.level.toFixed(2)}</div>
          <div class="lbl">ESTIMATED NTRP</div>
        </div>
      </div>
      <span class="conf-badge ${r.confidence}">${confLabels[r.confidence]}</span>
      <div style="font-size:12px;color:var(--dim)">약점 ${r.min.toFixed(2)} · 평균 ${r.avg.toFixed(2)}</div>
    </div>
    ${r.capped ? '<div class="cap-note">⚠️ 실전 경기 경험이 거의 없어 3.0을 초과하는 판정을 보류했습니다. NTRP는 경기 결과 기반 지표이므로, 실제 게임을 몇 차례 치른 뒤 다시 진단해 보세요.</div>' : ''}
    <div class="descriptor"><b>NTRP ${descKey} 구간</b> — ${DESCRIPTORS[descKey] || ''}</div>

    <div class="section-label">항목별 등급 (2.5 ~ 4.5)</div>
    ${breakdown}

    <div class="section-label">우선 보완 포인트</div>
    ${tips}

    <div class="section-label">판정 방식</div>
    <div class="card" style="margin-top:6px">
      <div class="card-sub" style="margin-top:0">각 항목은 NTRP 2.5→4.0 순서로 어려워지는 4개 능력 문항의 응답(잘 안 된다 0 / 가끔 0.5 / 안정적 1)을 합산해 2.5~4.5 사이에서 계산합니다. 최종 판정은 <b style="color:var(--text)">min(전체 평균, 최저 항목 + 0.5)</b>을 0.25 단위로 내림한 값입니다. 실제 경기에서는 가장 약한 부분이 집중 공략당하므로 약점이 판정을 끌어내리되, 한 항목 때문에 전체가 왜곡되지 않도록 보정했습니다.</div>
    </div>

    <button class="btn btn-primary" style="margin-top:22px" onclick="goTab('tactics')">🎯 내 레벨에 맞는 복식 전술 보기</button>
    <button class="btn btn-ghost" style="margin-top:10px" onclick="goHome()">홈으로</button>
    <button class="text-link" onclick="restartQuiz()">처음부터 다시 진단하기</button>
  </div>`;
}

/* ── 진단 탭 액션 ─────────────────────────────────────── */
function firstIncompleteStep() {
  for (let i = 0; i < CATEGORIES.length; i++) {
    if (!isCatComplete(CATEGORIES[i].key)) return i;
  }
  if (!isExpComplete()) return CATEGORIES.length;
  return 0;
}
function startQuiz() { state.mode = 'quiz'; state.step = firstIncompleteStep(); renderAssess(); }
function restartQuiz() {
  Object.keys(state.answers).forEach(k => delete state.answers[k]);
  state.exp.fill(null);
  try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
  state.mode = 'quiz'; state.step = 0;
  renderAssess();
}
function goHome() { state.mode = 'home'; renderAssess(); }
function goStep(i) { state.mode = 'quiz'; state.step = i; renderAssess(); }
function finishQuiz() { if (allComplete()) showResult(); }
function showResult() { state.mode = 'result'; renderAssess(); }

function refreshNextBtn() {
  const isExp = state.step >= CATEGORIES.length;
  const complete = isExp ? isExpComplete() : isCatComplete(CATEGORIES[state.step].key);
  const btn = document.getElementById('nextBtn');
  if (btn) btn.disabled = !complete;
}
function setSev(catKey, idx, sev) {
  if (!state.answers[catKey]) state.answers[catKey] = [null, null, null, null];
  state.answers[catKey][idx] = sev;
  saveState();
  // 화면 전체를 다시 그리지 않고 선택 상태만 갱신 (애니메이션 재생 방지)
  document.querySelectorAll(`.qchoice[data-cat="${catKey}"][data-idx="${idx}"]`).forEach(btn => {
    btn.classList.toggle('active', parseFloat(btn.dataset.sev) === sev);
  });
  refreshNextBtn();
}
function setExp(qi, li) {
  state.exp[qi] = li;
  saveState();
  document.querySelectorAll(`.qchoice[data-exp="${qi}"]`).forEach(btn => {
    btn.classList.toggle('active-blue', parseInt(btn.dataset.opt, 10) === li);
  });
  refreshNextBtn();
}

/* ═══════════════════════════════════════════════════════
   렌더: 복식 전술 탭
   ═══════════════════════════════════════════════════════ */
function courtSVG(players, arrows) {
  const lines = `
    <rect x="30" y="20" width="240" height="400" fill="none" stroke="var(--court-line)" stroke-width="2.5"/>
    <line x1="60" y1="20" x2="60" y2="420" stroke="var(--court-line)" stroke-width="1.5"/>
    <line x1="240" y1="20" x2="240" y2="420" stroke="var(--court-line)" stroke-width="1.5"/>
    <line x1="60" y1="112" x2="240" y2="112" stroke="var(--court-line)" stroke-width="1.5"/>
    <line x1="60" y1="328" x2="240" y2="328" stroke="var(--court-line)" stroke-width="1.5"/>
    <line x1="150" y1="112" x2="150" y2="328" stroke="var(--court-line)" stroke-width="1.5"/>
    <line x1="24" y1="220" x2="276" y2="220" stroke="rgba(255,255,255,0.85)" stroke-width="3.5"/>`;
  const arrowEls = (arrows || []).map(a => {
    if (a.type === 'ball') {
      return `<line x1="${a.x1}" y1="${a.y1}" x2="${a.x2}" y2="${a.y2}" stroke="#c9f24b" stroke-width="2.5" marker-end="url(#arrBall)"/>`;
    }
    return `<line x1="${a.x1}" y1="${a.y1}" x2="${a.x2}" y2="${a.y2}" stroke="rgba(255,255,255,0.65)" stroke-width="2" stroke-dasharray="5 5" marker-end="url(#arrMove)"/>`;
  }).join('');
  const pEls = (players || []).map(p => {
    const fill = p.team === 'us' ? '#c9f24b' : '#8b95a8';
    const txt = p.team === 'us' ? '#13200a' : '#10141d';
    return `
    <circle cx="${p.x}" cy="${p.y}" r="14" fill="${fill}" stroke="rgba(0,0,0,0.35)" stroke-width="1.5"/>
    ${p.label ? `<text x="${p.x}" y="${p.y + 4}" text-anchor="middle" font-size="11" font-weight="800" fill="${txt}" font-family="ui-monospace,monospace">${p.label}</text>` : ''}`;
  }).join('');
  return `<svg viewBox="0 0 300 440" xmlns="http://www.w3.org/2000/svg" role="img">${lines}${arrowEls}${pEls}</svg>`;
}

function myLevelIndex() {
  if (!allComplete()) return -1;
  const lv = computeResult().level;
  return LEVEL_TACTICS.findIndex(g => lv >= g.min && lv <= g.max);
}

function renderTactics() {
  const el = document.getElementById('tab-tactics');
  const mineIdx = myLevelIndex();

  const formations = FORMATIONS.map(f => `
    <div class="formation-card">
      <h3>${f.name} <span class="formation-tag">${f.tag}</span></h3>
      <div class="court-box">${courtSVG(f.players, f.arrows)}</div>
      <div class="desc">${f.desc}</div>
      <div class="fm-meta">
        <div class="row"><span class="k when">언제</span><span class="v">${f.when}</span></div>
        <div class="row"><span class="k weak">약점</span><span class="v">${f.weak}</span></div>
      </div>
    </div>`).join('');

  const lessons = LESSONS.map((sec, si) => `
    <details class="lesson" ${si === 0 ? 'open' : ''}>
      <summary>${sec.icon} ${sec.title} <span class="arrow">▶</span></summary>
      <div class="lesson-body">
        ${sec.items.map(it => `
          <div class="lesson-item">
            <h4>${it.h}</h4>
            <p>${it.p}</p>
          </div>`).join('')}
      </div>
    </details>`).join('');

  const levels = LEVEL_TACTICS.map((g, gi) => `
    <div class="level-card ${gi === mineIdx ? 'mine' : ''}">
      <div class="level-head">
        <span class="level-range">NTRP ${g.range}</span>
        <h3>${g.title}</h3>
        ${gi === mineIdx ? '<span class="mine-badge">MY LEVEL</span>' : ''}
      </div>
      <ul>${g.points.map(p => `<li>${p}</li>`).join('')}</ul>
    </div>`).join('');

  const answered = Object.keys(state.quizPicks).length;
  const correct = Object.entries(state.quizPicks).filter(([qi, pick]) => TACTIC_QUIZ[qi].answer === pick).length;

  const quiz = TACTIC_QUIZ.map((q, qi) => {
    const pick = state.quizPicks[qi];
    const done = pick !== undefined;
    return `
    <div class="tq-card">
      <div class="tq-q"><span class="idx">Q${qi + 1}.</span>${q.q}</div>
      ${q.choices.map((c, ci) => {
        let cls = '';
        if (done) {
          if (ci === q.answer) cls = 'correct';
          else if (ci === pick) cls = 'wrong';
        }
        return `<button class="tq-opt ${cls}" ${done ? 'disabled' : ''} onclick="pickQuiz(${qi}, ${ci})">${String.fromCharCode(65 + ci)}. ${c}</button>`;
      }).join('')}
      ${done ? `<div class="tq-why"><b>${pick === q.answer ? '✔ 정답!' : '✘ 오답'}</b> ${q.why}</div>` : ''}
    </div>`;
  }).join('');

  el.innerHTML = `
  <div class="screen wrap">
    <div class="hero">
      <span class="eyebrow">🎯 Doubles Tactics</span>
      <h1>복식 전술 가이드</h1>
      <p>포메이션의 원리부터 상황별 판단까지. 복식은 기술보다 <b style="color:var(--text)">위치와 약속</b>의 게임입니다.</p>
    </div>

    <div class="section-label">포메이션 — 옆으로 넘겨보세요</div>
    <div class="seg-scroll">${formations}</div>
    <div class="legend">
      <span><span class="dot" style="background:#c9f24b"></span>우리 팀</span>
      <span><span class="dot" style="background:#8b95a8"></span>상대 팀</span>
      <span><span style="color:#c9f24b">→</span> 공</span>
      <span><span style="color:rgba(255,255,255,0.65)">⇢</span> 움직임</span>
    </div>

    <div class="section-label">상황별 전술 레슨</div>
    ${lessons}

    <div class="section-label">레벨별 추천 전술</div>
    ${mineIdx === -1 ? '<div class="note" style="margin-top:8px">NTRP 진단을 완료하면 내 레벨에 맞는 전술이 표시됩니다. <b style="cursor:pointer;text-decoration:underline" onclick="goTab(\'assess\')">진단하러 가기 →</b></div>' : ''}
    ${levels}

    <div class="section-label">전술 감각 퀴즈</div>
    <div class="tq-progress">${answered} / ${TACTIC_QUIZ.length} 풀이${answered > 0 ? ` · 정답 ${correct}` : ''}</div>
    ${quiz}
    ${answered === TACTIC_QUIZ.length ? `<div class="tq-score">🎾 ${correct} / ${TACTIC_QUIZ.length} 정답${correct === TACTIC_QUIZ.length ? ' — 퍼펙트!' : correct >= 6 ? ' — 훌륭해요!' : ' — 레슨을 다시 읽어보세요'}</div>` : ''}
    ${answered > 0 ? '<button class="text-link" onclick="resetQuizPicks()">퀴즈 다시 풀기</button>' : ''}
  </div>`;
}

function pickQuiz(qi, ci) {
  if (state.quizPicks[qi] !== undefined) return;
  state.quizPicks[qi] = ci;
  const y = window.scrollY;
  renderTactics();
  window.scrollTo(0, y);
}
function resetQuizPicks() {
  state.quizPicks = {};
  const y = window.scrollY;
  renderTactics();
  window.scrollTo(0, y);
}

/* ═══════════════════════════════════════════════════════
   탭 전환 & 초기화
   ═══════════════════════════════════════════════════════ */
function goTab(tab) {
  state.tab = tab;
  document.getElementById('tab-assess').hidden = tab !== 'assess';
  document.getElementById('tab-tactics').hidden = tab !== 'tactics';
  document.getElementById('nav-assess').classList.toggle('active', tab === 'assess');
  document.getElementById('nav-tactics').classList.toggle('active', tab === 'tactics');
  if (tab === 'tactics') renderTactics();
  else renderAssess();
}

loadState();
if (allComplete()) state.mode = 'home';
renderAssess();
renderTactics();
</script>
